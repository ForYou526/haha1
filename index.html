<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamy Love ☁️💖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  cursor:pointer;
  background: linear-gradient(to top,#a6d8ff,#eaf6ff);
}

/* SUN GLOW */
.sun{
  position:absolute;
  top:-100px;
  right:-100px;
  width:400px;
  height:400px;
  background: radial-gradient(circle,#fff7b1 0%, #ffd86b 40%, transparent 70%);
  border-radius:50%;
  filter:blur(40px);
  animation: pulseSun 6s infinite alternate;
}

@keyframes pulseSun{
  from{ transform:scale(1);}
  to{ transform:scale(1.1);}
}

/* FLUFFY CLOUDS */
.cloud{
  position:absolute;
  background:white;
  border-radius:50%;
  opacity:0.9;
  filter:blur(1px);
  animation: moveCloud linear infinite;
}

.cloud:before,
.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}

.cloud1{
  width:180px;
  height:60px;
  top:25%;
  left:-200px;
  animation-duration:45s;
}
.cloud1:before{
  width:90px;height:90px;top:-40px;left:30px;
}
.cloud1:after{
  width:70px;height:70px;top:-20px;left:90px;
}

.cloud2{
  width:220px;
  height:70px;
  top:60%;
  left:-300px;
  animation-duration:60s;
}
.cloud2:before{
  width:100px;height:100px;top:-50px;left:40px;
}
.cloud2:after{
  width:80px;height:80px;top:-30px;left:110px;
}

@keyframes moveCloud{
  from{ transform:translateX(-300px);}
  to{ transform:translateX(120vw);}
}

.container{
  position:relative;
  z-index:10;
  padding:20px;
  color:#ff4da6;
  font-size:24px;
  font-weight:bold;
  animation: fadeText 0.4s ease;
}

@keyframes fadeText{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

/* 3D LOVE */
.love{
  font-size:90px;
  font-weight:bold;
  margin-top:20px;
  background: linear-gradient(45deg,#ff0080,#ff4da6,#ff99cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 5px 0 #cc0066,
    0 10px 20px rgba(0,0,0,0.2);
  transform:scale(0);
  transition:1s cubic-bezier(.68,-0.55,.27,1.55);
}

.love.show{
  transform:scale(1.3);
}

.extra{
  margin-top:15px;
  font-size:20px;
  color:#ff1493;
  opacity:0;
  transition:1s;
}

.extra.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="sun"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="container" id="text">
Tap dimana aja ya 💖
</div>

<script>
const texts = [
"Hey kamu ❤️",
"Aku mau ngomong sesuatu nih...",
"Coba pencet",
"Pencet lagi",
"Semangat mencetnya 😆",
"Ini terakhir...",
"Serius...",
"Ini...",
"Terakhir...",
"Tapi boong yahahahaha 😜",
"Aku tau kamu pasti kesel 😂",
"Hmmm...",
"Yaudah deh...",
"Padahal...",
"Aku cuman mau bilang...",
"Orang orang naik motor...",
"I LOVEEE YOUU SAYANGKUUU 💕"
];

let index = 0;
const textElement = document.getElementById("text");

document.body.addEventListener("click", function(){
  if(index < texts.length){
    textElement.innerHTML = texts[index];
    index++;
  } else {
    showButton();
  }
});

function showButton(){
  textElement.innerHTML = `
    Pencet tombolnya 💖<br>
    <button onclick="showLove(event)">PENCET AKU</button>
    <div class="love" id="loveText">LOVE 💗</div>
    <div class="extra" id="extraText">nihh cintakuu ambil aja semuanya 💞</div>
  `;
}

function showLove(e){
  e.stopPropagation();
  document.getElementById("loveText").classList.add("show");
  document.getElementById("extraText").classList.add("show");
}
</script>

</body>
</html>
