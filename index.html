<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Hour Love ☁️💛</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  cursor:pointer;
  background: linear-gradient(to top,#a6d8ff,#eaf6ff);
  transition:2s;
}

/* GOLDEN HOUR MODE */
body.golden{
  background: linear-gradient(to top,#ff9a3c,#ffd36b,#fff1c1);
}

/* SUN */
.sun{
  position:absolute;
  top:-100px;
  right:-100px;
  width:400px;
  height:400px;
  background: radial-gradient(circle,#fff7b1 0%, #ffd86b 40%, transparent 70%);
  border-radius:50%;
  filter:blur(40px);
  animation: pulseSun 6s infinite alternate;
}

@keyframes pulseSun{
  from{ transform:scale(1);}
  to{ transform:scale(1.1);}
}

/* CLOUD */
.cloud{
  position:absolute;
  background:white;
  border-radius:50%;
  opacity:0.9;
  cursor:pointer;
  animation: moveCloud linear infinite;
}

.cloud:before,
.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}

.cloud1{
  width:180px;
  height:60px;
  top:30%;
  left:10%;
  animation-duration:50s;
}
.cloud1:before{
  width:90px;height:90px;top:-40px;left:30px;
}
.cloud1:after{
  width:70px;height:70px;top:-20px;left:90px;
}

@keyframes moveCloud{
  from{ transform:translateX(-50px);}
  to{ transform:translateX(50px);}
}

.container{
  position:relative;
  z-index:10;
  padding:20px;
  color:#ff4da6;
  font-size:24px;
  font-weight:bold;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

/* BIG HEART */
.big-heart{
  font-size:120px;
  opacity:0;
  transform:scale(0);
  transition:1.2s cubic-bezier(.68,-0.55,.27,1.55);
}

.big-heart.show{
  opacity:1;
  transform:scale(1.4);
}

/* HEART PARTICLE */
.heart{
  position:absolute;
  color:#ff4da6;
  font-size:20px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp{
  from{ transform:translateY(0) scale(1); opacity:1;}
  to{ transform:translateY(-100px) scale(1.5); opacity:0;}
}
</style>
</head>

<body>

<div class="sun"></div>
<div class="cloud cloud1" onclick="explodeCloud(event)"></div>

<div class="container" id="text">
Tap dimana aja ya 💖
</div>

<script>
const texts = [
"Hey kamu ❤️",
"Aku mau ngomong sesuatu nih...",
"Pencet lagi 😆",
"Semangat mencetnya",
"Ini terakhir...",
"Tapi boong 😜",
"Aku cuma mau bilang...",
"I LOVEEE YOUU SAYANGKUUU 💕"
];

let index = 0;
const textElement = document.getElementById("text");

document.body.addEventListener("click", function(){
  if(index < texts.length){
    textElement.innerHTML = texts[index];
    index++;
  } else {
    showButton();
  }
});

function showButton(){
  textElement.innerHTML = `
    Pencet tombolnya 💖<br>
    <button onclick="showLove(event)">PENCET AKU</button>
    <div class="big-heart" id="bigHeart">💖</div>
  `;
}

function showLove(e){
  e.stopPropagation();
  document.body.classList.add("golden");
  document.getElementById("bigHeart").classList.add("show");
}

function explodeCloud(e){
  e.stopPropagation();
  const cloud = e.currentTarget;
  cloud.style.display="none";

  for(let i=0;i<12;i++){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";
    heart.style.left = (cloud.offsetLeft + 50 + Math.random()*50)+"px";
    heart.style.top = (cloud.offsetTop + 20)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove()},2000);
  }
}
</script>

</body>
</html>
